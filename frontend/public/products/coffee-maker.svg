<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#F5F4F1"/>
  <!-- ground shadow -->
  <ellipse cx="300" cy="500" rx="175" ry="20" fill="#E7E5E0"/>
  <!-- machine back column -->
  <rect x="170" y="120" width="110" height="380" rx="18" fill="#2A6B63"/>
  <!-- top unit (water tank + mill) -->
  <rect x="170" y="120" width="270" height="90" rx="18" fill="#2A6B63"/>
  <rect x="190" y="140" width="110" height="50" rx="10" fill="#5FA19A"/>
  <rect x="316" y="140" width="104" height="50" rx="10" fill="#B9D9D5"/>
  <!-- bean window -->
  <circle cx="368" cy="165" r="16" fill="#22574F"/>
  <circle cx="398" cy="165" r="10" fill="#22574F"/>
  <!-- drip head -->
  <rect x="300" y="210" width="120" height="34" rx="10" fill="#22574F"/>
  <rect x="348" y="244" width="24" height="14" rx="6" fill="#6B7280"/>
  <!-- dripping coffee -->
  <rect x="356" y="266" width="8" height="46" rx="4" fill="#8C5A2B" opacity="0.85"/>
  <!-- carafe -->
  <g>
    <path d="M296 330 l128 0 6 130 q1 22 -24 22 l-92 0 q-25 0 -24 -22 z" fill="#B9D9D5" opacity="0.9"/>
    <path d="M306 400 l108 0 3 60 q1 12 -16 12 l-82 0 q-17 0 -16 -12 z" fill="#8C5A2B"/>
    <rect x="292" y="318" width="136" height="16" rx="8" fill="#6B7280"/>
    <path d="M428 350 q34 8 30 44 q-4 32 -34 34 l-2 -18 q18 -4 20 -20 q2 -20 -18 -24 z" fill="#9CA3AF"/>
  </g>
  <!-- base plate -->
  <rect x="170" y="480" width="270" height="20" rx="10" fill="#22574F"/>
  <rect x="280" y="462" width="160" height="20" rx="8" fill="#6B7280"/>
  <!-- controls -->
  <circle cx="225" cy="300" r="22" fill="#B9D9D5"/>
  <circle cx="225" cy="300" r="9" fill="#22574F"/>
  <circle cx="225" cy="360" r="9" fill="#D97706"/>
  <rect x="205" y="396" width="40" height="10" rx="5" fill="#5FA19A"/>
  <rect x="205" y="418" width="40" height="10" rx="5" fill="#5FA19A"/>
  <!-- steam -->
  <g fill="none" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" opacity="0.8">
    <path d="M330 96 q10 -16 0 -32"/>
    <path d="M366 100 q12 -20 0 -40"/>
  </g>
</svg>
