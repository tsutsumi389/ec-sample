  <!-- steam -->
  <g fill="none" stroke="#9CA3AF" stroke-width="7" stroke-linecap="round" opacity="0.8">
    <path d="M258 128 q12 -22 0 -44"/>
    <path d="M300 120 q14 -26 0 -52"/>
    <path d="M342 128 q12 -22 0 -44"/>
  </g>
  <!-- kettle body -->
  <path d="M212 200 l176 0 q10 130 22 210 q4 34 -30 34 l-160 0 q-34 0 -30 -34 q12 -80 22 -210 z" fill="#2A6B63"/>
  <!-- highlight -->
