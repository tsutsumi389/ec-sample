  <!-- switch -->
  <rect x="424" y="368" width="18" height="34" rx="9" fill="#D97706"/>
  <!-- power base -->
  <rect x="180" y="452" width="240" height="24" rx="12" fill="#6B7280"/>
  <rect x="160" y="472" width="280" height="20" rx="10" fill="#4B5563"/>
  <circle cx="300" cy="464" r="6" fill="#B9D9D5"/>
</svg>
